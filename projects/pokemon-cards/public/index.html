<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Card Collection</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-content">
      <h1><span class="pokeball-icon"></span> Pokemon Cards</h1>
      <p class="subtitle">Collect, browse & create your own cards</p>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Search Pokemon...">
      </div>
      <div class="filter-row">
        <div class="type-filters" id="typeFilters"></div>
        <button class="btn btn-primary" id="addBtn">+ Add Card</button>
      </div>
    </section>

    <section class="card-grid" id="cardGrid"></section>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <button class="modal-close" id="detailClose">&times;</button>
      <div class="modal-card" id="detailContent"></div>
    </div>
  </div>

  <!-- Add Card Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal modal-form">
      <button class="modal-close" id="addClose">&times;</button>
      <h2>Create Custom Card</h2>
      <form id="addForm">
        <div class="form-group">
          <label for="cardName">Name</label>
          <input type="text" id="cardName" required placeholder="e.g. Sparklechu">
        </div>
        <div class="form-group">
          <label for="cardType">Type</label>
          <select id="cardType" required></select>
        </div>
        <div class="form-group">
          <label for="cardHp">HP</label>
          <input type="number" id="cardHp" required min="1" max="999" placeholder="e.g. 80">
        </div>
        <div class="form-group">
          <label for="cardMoves">Moves (comma-separated)</label>
          <input type="text" id="cardMoves" required placeholder="e.g. Thunder, Quick Attack">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Card</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
